<!DOCTYPE html>
<html>
<head>
<title>Dev's Math Website</title>

</head>

<body style="background-color:red; text-align:center; margin-top:200px;">

<img src="dev_website_icon.png" width="200">

<h1>Dev's Math Calculator</h1>

<h1>Dev's Math Calculator [it knows only addition, subtraction, multiplication and division]</h1>

<input type="text" id="question" placeholder="Type math here">
<button onclick="answerQuestion()">Solve</button>

<h1 id="answer"></h1>

<script>
function answerQuestion() {
    let q = document.getElementById("question").value;
    let result = eval(q);
    document.getElementById("answer").innerHTML = result;
}
</script>

</body>
</html>
